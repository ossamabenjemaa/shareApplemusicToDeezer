name: Publication GitHub Pages

# Le site est servi depuis la branche gh-pages (mode « deploy from a branch »,
# activé automatiquement par GitHub à la création de la branche).
# Ce workflow republie donc main → gh-pages à chaque push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
